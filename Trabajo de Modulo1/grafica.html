<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafica CRUD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            header {
                    background-color: #182385;
                    color: rgb(255, 255, 255);   
                    padding: 15px;
                    text-align: center;
                }
                nav a {
                    color : white;
                    margin: 0 20px;
                    text-decoration: auto;
                    font-weight: bold;
                }
                nav a:hover {
                    text-decoration: underline;
                }
            body {
                background: linear-gradient(to right, #dbeafe, #eff6ff);
                font-family: Arial, sans-serif;
            }
            .card {
                border-radius: 15px;
                overflow: hidden;
            }
            .card-header {
                background: linear-gradient(135deg, #182385, #2563eb);
                text-align: center;
                font-size: 20px;
                font-weight: bold;
            }
            label {
                font-weight: bold;
                color: #1e3a8a;
            }
            input {
                border-radius: 10px !important;
            }
            .btn-success {
                background-color: #16a34a;
                border: none;
                border-radius: 10px;
            }
            .btn-success:hover {
                background-color: #15803d;
            }
            .btn-warning {
                border-radius: 10px;
            }
            table {
                border-radius: 10px;
                overflow: hidden;
            }
            thead {
                background-color: #1e293b;
                color: white;
            }
            tbody tr:hover {
                background-color: #e0f2fe;
                transition: 0.3s;
            }
                .boton-eliminar {
                    background:linear-gradient(45deg, #ff4d4d, #cc0000);
                    color: white;
                    border: none;
                    padding: 6px 12px;
                    border-radius: 8px;
                    cursor: pointer;
                    transition: 0.3s;
                }
                .boton-eliminar:hover{
                    transform: scale(1.1);
                }
                .boton-editar{
                    background:linear-gradient(45deg, #ffc107, #ff9800);
                    color: black;
                    border: none;
                    padding: 6px 12px;
                    border-radius: 8px;
                    cursor: pointer;
                    transition: 0.3s;
                }
                .boton-editar:hover {
                    transform: scale(1.1);
                }
                .boton-reporte:hover{
                    transform: scale(1.1);
                    background: linear-gradient(45deg, #4e6cff, #182385);
                }
                .boton-grafica{
                    background:linear-gradient(45deg, #064c85, #045083);
                    color: black;
                    border: none;
                    padding: 6px 12px;
                    border-radius: 8px;
                    cursor: pointer;
                    transition: 0.3s;
                }
                .boton-grafica:hover {
                    transform: scale(1.1);
                }
        </style>
    </head>
    <header>
        <button class="btn btn-primary shadow-lg" onclick="window.location.href='crud.html'"> Regresar </button>
    </header>
<body class="bg-light"><div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header text-white">
            Grafica de Edades de los Estudiantes
        </div>
        <div class="card-body">
            <canvas id="myChart" width="900" height="900"></canvas>
        </div>
    </div>
    <script src="grafica.js"></script>
</body>

</html>
