<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            header {
                    background-color: #182385;
                    color: rgb(255, 255, 255);   
                    padding: 15px;
                    text-align: center;
                }
                nav a {
                    color : white;
                    margin: 0 20px;
                    text-decoration: auto;
                    font-weight: bold;
                }
                nav a:hover {
                    text-decoration: underline;
                }
            body {
                background: linear-gradient(to right, #dbeafe, #eff6ff);
                font-family: Arial, sans-serif;
            }
            .card {
                border-radius: 15px;
                overflow: hidden;
            }
            .card-header {
                background: linear-gradient(135deg, #182385, #2563eb);
                text-align: center;
                font-size: 20px;
                font-weight: bold;
            }
            label {
                font-weight: bold;
                color: #1e3a8a;
            }
            input {
                border-radius: 10px !important;
            }
            .btn-success {
                background-color: #16a34a;
                border: none;
                border-radius: 10px;
            }
            .btn-success:hover {
                background-color: #15803d;
            }
            .btn-warning {
                border-radius: 10px;
            }
            table {
                border-radius: 10px;
                overflow: hidden;
            }
            thead {
                background-color: #1e293b;
                color: white;
            }
            tbody tr:hover {
                background-color: #e0f2fe;
                transition: 0.3s;
            }
                .boton-eliminar {
                    background:linear-gradient(45deg, #ff4d4d, #cc0000);
                    color: white;
                    border: none;
                    padding: 6px 12px;
                    border-radius: 8px;
                    cursor: pointer;
                    transition: 0.3s;
                }
                .boton-eliminar:hover{
                    transform: scale(1.1);
                }
                .boton-editar{
                    background:linear-gradient(45deg, #ffc107, #ff9800);
                    color: black;
                    border: none;
                    padding: 6px 12px;
                    border-radius: 8px;
                    cursor: pointer;
                    transition: 0.3s;
                }
                .boton-editar:hover {
                    transform: scale(1.1);
                }
                .boton-reporte:hover{
                    transform: scale(1.1);
                    background: linear-gradient(45deg, #4e6cff, #182385);
                }
                .boton-grafica{
                    background:linear-gradient(45deg, #064c85, #045083);
                    color: black;
                    border: none;
                    padding: 6px 12px;
                    border-radius: 8px;
                    cursor: pointer;
                    transition: 0.3s;
                }
                .boton-grafica:hover {
                    transform: scale(1.1);
                }
            </style>
        </style>
    </head>
    <header>
        <button class="btn btn-primary shadow-lg" onclick="window.location.href='inicio.html'"> Volver al inicio</button>
            <button class="btn btn-primary shadow-lg" onclick="window.location.href='crud1.html'"> Crud Biblioteca </button>
    </header>
    <body class="bg-light"><div class="container mt-5">
        <div class="card shadow-lg">
            <div class="card-header text-white">
                Estudiantes 
            </div>
        <div class="card-body">
            <input type="hidden" id="indice">
            <div class="row mb-3">
                <div class="col-md-6">
                    <input type="hidden" id="html_indice">
                    <label>Nombre</label>
                    <input type="text" id="html_nombre" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Apellido</label>
                    <input type="text" id="html_apellido" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Nie</label>
                    <input type="number" id="html_nie" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Edad</label>
                    <input type="number" id="html_edad" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <button id="boton_guardar" class="btn btn-success" onclick="guardar()">Guardar</button>
                <button id="boton_actualizar" class="btn btn-warning" onclick="actualizar()">Actualizar</button>
                <button  class="btn btn-warning" onclick="limpiar()">Limpiar</button>
                <button class="btn btn-primary shadow-lg" onclick="window.location.href= 'reporte.html'">Reporte</button>
                <button class="btn btn-primary shadow-lg" onclick="window.location.href='grafica.html'">Ir a grafica</button>
            </div>
            <hr>
            <div class="table-responsive">
                <table class="table table-bordered table-hover text-center">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Nie</th>
                            <th>Edad</th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
<script src="crud.js"></script>
</html>
