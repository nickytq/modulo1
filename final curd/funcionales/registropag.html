<!DOCTYPE html>
<html lang = "es">
    <head>
        <meta charset="UTF-8">
        <title> Registro </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                font-family: Arial;
                background-color: #f5f5f5;
            }
            .registro-box{
                background: white;
                padding: 30px;
                border-radius: 12px;
                width: 300px;
                text-align: center;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
            }
            button{
                background-color: #182385;
                color: white;
                border: none;
                padding: 10px;
                width: 100%;
                border-radius: 8px;
                margin-top:10px;
            }
            button:hover{
                background-color: #0f175c;
            }
        </style>
    </head>
    <body>
        <div class="registro-box">
            <h2> Crear cuenta</h2>
            <input type="text" id="register_user" placeholder="Usuario" class="form-control mb-2">
            <input type="password" id="register_password" placeholder="Contraseña" class="form-control mb-2">
            <button type="button" onclick="guardar()">Guardar</button>
            <p id="mensaje"></p>
            <p class="mt-3 text-center">
            ¿Ya tienes una cuenta? <a href="loginecho.html">Inicia sesion aqui</a>
            </p>
            <a href="inicioyaecho.html">Volver al inicio</a>
            <script src="registrogud.js"></script>
        </div>
    </body>
</html>
