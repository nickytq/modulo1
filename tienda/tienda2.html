<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Skateboards y mas</title>
    <link rel="stylesheet" href="tienda.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo" alt="skate">
        </div>
        <h1>Tienda de Skateboards y mas</h1>
        <nav>
            <a href="Contactos.html">Contactos</a>
            <a href="#" onclick="abrirCarrito(); return false;">Carrito</a>
        </nav>
    </header>
    <main>
        <div id="productos" class="grid-productos">
            <div class="producto">
                <img src="137800-0-SK8DLX-Rose85.jpg.webp" alt="Skateboard1">
                <h3>Skateboard 1</h3>
                <p>Precio: $100</p>
                <button onclick="agregar('Skateboard1', 100)">Agregar al carrito</button>
            </div>
            <div class="producto">
                <img src="141291-0-Element-Section825.jpg.webp" alt="Skateboard2">
                <h3>Skateboard 2</h3>
                <p>Precio: $75</p>
                <button onclick="agregar('Skateboard2', 75)">Agregar al carrito</button>
            </div>
        </div>
        <div id="sidebar" class="sidebar">
            <div class="encabezado-sidebar">
                <h2>Carrito</h2>
                <button onclick="cerrarCarrito()">X</button>
            </div>
            <div id="listaCarrito">
            </div>
            <h3>Total: $<span id="total">0</span></h3>
            <button onclick="vaciarCarrito()">Vaciar carro</button>
            <button onclick="abrirPago()">Finalizar compra</button>
        </div>
        <div id="modalPago" class="modal">
            <div class="contenido-modal">
                <h2>Pago</h2>
                <input  required="text" id="nombre" placeholder="Nombre del titular">
                <input  required="text" id="tarjeta" maxlength="16" placeholder="Numero de tarjeta">
                <input  required="month" id="fecha" placeholder="MM/YY">
                <input  required="password" id="cvv" maxlength="3" placeholder="CVV">
                <button onclick="pagar()">Pago</button>
                <button onclick="cerrarPago()">Cerrar</button>
            </div>
        </div>
    </main>

<footer>
    <p>Hecho por Mateo&copy;</p>
</footer>
<script src="tienda.js"></script>
</body>
</html>
