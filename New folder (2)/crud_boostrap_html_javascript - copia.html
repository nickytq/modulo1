<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD con Bootstrap</title>
    <!-- ENLACE A JAVASCRIPT -->
    <script src="script.js"></script>
    <!-- BOOTSTRAP 5 ENLACE POR CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">CRUD con JavaScript + Bootstrap</h4>
        </div>

        <div class="card-body">

            <input type="hidden" id="indice">

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" id="nombre" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Apellido</label>
                    <input type="text" id="apellido" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">NIE</label>
                    <input type="number" id="nie" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Edad</label>
                    <input type="number" id="edad" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <button class="btn btn-success" onclick="guardar()">Guardar</button>
                <button class="btn btn-warning" onclick="actualizar()">Actualizar</button>
            </div>

            <hr>

            <div class="table-responsive">
                <table class="table table-bordered table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th width="200">Nombre</th>
                            <th width="200">Apellido</th>
                            <th width="200">NIE</th>
                            <th width="200">Edad</th>
                            <th width="200">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>

        </div>
    </div>

</div>

<!-- From Uiverse.io by jaykdoe --> 
<div class="container">
<div id="stars"></div>
<div id="stars2"></div>
<div id="stars3"></div>
<div></div>
</div>

</body>
</html>
