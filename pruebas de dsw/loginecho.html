<!DOCTYPE html>
<html lang = "es">
    <head>
        <meta charset="UTF-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            header {
                background-color: #182385;
                color: rgb(255, 255, 255);   
                padding: 15px;
                text-align: center;
            }
            nav a {
                color : white;
                margin: 0 20px;
                text-decoration: auto;
                font-weight: bold;
            }
            nav a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
    <header>
        <h1>Inicio de sesion</h1>
    </header>

    <style>
        body{
            background-color: flex;
            justify-content: center;
            align-items: center;
            height:  100vh;
            font-family: Arial, sans-serif;
        }
        .login-box{
            background-color: oklch(100% 0.00011 271.152);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input{
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 200px;
        }
        button{
            margin-top: 10px auto;
            background-color: #182385;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: block;
            margin: 15px auto;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        button:hover{
            background-color: #0f175c;
            transform: scale(1.05);
        }
    </style>
    <div class="login-box">
        <form onsubmit="aceptar(); return false;">
            <input type="text" id="login_user" placeholder="Usuario" required>
            <input type="password" id="login_password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
        <script src="index.js"></script>
        <p class="mt-3 text-center">¿No tienes una cuenta? <a href="Registro.html">Regístrate aquí</a></p>

        <a href="inicioyaecho.html">Volver al inicio</a>
    </div>
    </body>
</html>
