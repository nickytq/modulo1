<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Teclado Braille Accesible</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
background:#020617;
padding:15px;
font-size:22px;
letter-spacing:1px;
}

h2{
margin-top:20px;
}

.contenedor{
display:grid;
grid-template-columns:repeat(2,140px);
gap:18px;
justify-content:center;
margin-top:30px;
}

.boton{
width:140px;
height:140px;
border-radius:50%;
border:none;
background:#1e293b;
color:white;
font-size:30px;
cursor:pointer;
transition:.2s;
}

.boton:hover{
transform:scale(1.05);
}

.activo{
background:#38bdf8;
}

.panel{
margin-top:30px;
}

#texto{
font-size:28px;
min-height:40px;
background:#020617;
margin:20px auto;
padding:15px;
width:60%;
border-radius:10px;
}

button.control{
padding:12px 18px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:#38bdf8;
color:black;
}

button.control:hover{
background:#0ea5e9;
}

.modo{
background:#22c55e !important;
}

footer{
margin-top:40px;
opacity:.7;
font-size:14px;
}

</style>
</head>

<body>

<header>
Sistema de Escritura Braille Digital
</header>

<h2>Celda Braille Interactiva</h2>

<p>Selecciona puntos y presiona "Agregar letra"</p>

<div class="contenedor">

<button class="boton" data-dot="1">1</button>
<button class="boton" data-dot="4">4</button>

<button class="boton" data-dot="2">2</button>
<button class="boton" data-dot="5">5</button>

<button class="boton" data-dot="3">3</button>
<button class="boton" data-dot="6">6</button>

</div>

<div class="panel">

<button class="control" onclick="agregar()">Agregar letra</button>
<button class="control" onclick="borrar()">Borrar</button>
<button class="control" onclick="limpiar()">Limpiar todo</button>
<button class="control modo" onclick="contraste()">Modo alto contraste</button>

<div id="texto"></div>

</div>

<footer>
Proyecto educativo de accesibilidad digital
</footer>

<script>

let seleccion = [];
let textoFinal = "";

document.querySelectorAll(".boton").forEach(btn=>{
btn.addEventListener("click",()=>{

let dot = btn.dataset.dot;

if(seleccion.includes(dot)){
seleccion = seleccion.filter(d => d != dot);
btn.classList.remove("activo");
}else{
seleccion.push(dot);
btn.classList.add("activo");
}

});
});


function mapaBraille(){

return{

"1":"a",
"12":"b",
"14":"c",
"145":"d",
"15":"e",
"124":"f",
"1245":"g",
"125":"h",
"24":"i",
"245":"j",

"13":"k",
"123":"l",
"134":"m",
"1345":"n",
"135":"o",
"1234":"p",
"12345":"q",
"1235":"r",
"234":"s",
"2345":"t",

"136":"u",
"1236":"v",
"2456":"w",
"1346":"x",
"13456":"y",
"1356":"z"

};

}


function agregar(){

seleccion.sort();
let clave = seleccion.join("");

let letra = mapaBraille()[clave] || "";

if(letra == ""){
alert("Combinación no válida");
return;
}

textoFinal += letra;

document.getElementById("texto").innerHTML = textoFinal;

hablar(letra);

resetDots();

}


function hablar(texto){

let voz = new SpeechSynthesisUtterance(texto);
voz.lang = "es-ES";
speechSynthesis.speak(voz);

}


function borrar(){

textoFinal = textoFinal.slice(0,-1);
document.getElementById("texto").innerHTML = textoFinal;

}


function limpiar(){

textoFinal = "";
document.getElementById("texto").innerHTML = "";
resetDots();

}


function resetDots(){

seleccion = [];
document.querySelectorAll(".boton").forEach(btn=>{
btn.classList.remove("activo");
});

}


function contraste(){

if(document.body.style.background == "black"){
document.body.style.background = "#0f172a";
document.body.style.color = "white";
}else{
document.body.style.background = "black";
document.body.style.color = "yellow";
}

}

</script>

</body>
</html>
