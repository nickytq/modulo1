<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fondo Estrellas Cayendo</title>

<style>

/* Fondo general */
body{
margin:0;
background:linear-gradient(to bottom,#020617,#000000);
height:100vh;
overflow:hidden;
}

/* Contenedor de estrellas */
.estrellas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

/* Estrella individual */
.estrella{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
box-shadow:0 0 6px white;
animation:caer linear infinite;
}

/* Animación de caída */
@keyframes caer{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

/* Variaciones de velocidad */
.estrella:nth-child(1){left:10%; animation-duration:5s;}
.estrella:nth-child(2){left:20%; animation-duration:7s;}
.estrella:nth-child(3){left:30%; animation-duration:6s;}
.estrella:nth-child(4){left:40%; animation-duration:8s;}
.estrella:nth-child(5){left:50%; animation-duration:5s;}
.estrella:nth-child(6){left:60%; animation-duration:9s;}
.estrella:nth-child(7){left:70%; animation-duration:6s;}
.estrella:nth-child(8){left:80%; animation-duration:7s;}
.estrella:nth-child(9){left:90%; animation-duration:8s;}
.estrella:nth-child(10){left:15%; animation-duration:10s;}
.estrella:nth-child(11){left:35%; animation-duration:6s;}
.estrella:nth-child(12){left:75%; animation-duration:7s;}

</style>
</head>

<body>

<div class="estrellas">
<div class="estrella"></div>
<div class="estrella"></div>
<div class="estrella"></div>
<div class="estrella"></div>
<div class="estrella"></div>
<div class="estrella"></div>
<div class="estrella"></div>
<div class="estrella"></div>
<div class="estrella"></div>
<div class="estrella"></div>
<div class="estrella"></div>
<div class="estrella"></div>
</div>

</body>
</html>
